name: Daily AI News Brief

on:
  schedule:
    - cron: "7 0 * * *"   # UTC 00:07 = Beijing 08:07 (off-peak minute avoids on-hour congestion)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: news-gen
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r python-service/requirements.txt
      - name: Generate Chinese news
        id: gen-zh
        continue-on-error: true
        run: python python-service/generate_news.py --lang=zh
        env:
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          QWEN_BASE_URL: ${{ secrets.QWEN_BASE_URL }}
          MODEL_NAME: ${{ secrets.MODEL_NAME }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
      - name: Generate English news
        id: gen-en
        continue-on-error: true
        run: python python-service/generate_news.py --lang=en
        env:
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          QWEN_BASE_URL: ${{ secrets.QWEN_BASE_URL }}
          MODEL_NAME: ${{ secrets.MODEL_NAME }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
      - name: Check generation results
        run: |
          if [ "${{ steps.gen-zh.outcome }}" = "failure" ] && [ "${{ steps.gen-en.outcome }}" = "failure" ]; then
            echo "Both zh and en generation failed, aborting"
            exit 1
          fi
          echo "At least one language generated successfully"
      - name: Commit and push
        run: |
          git config user.name "AI Content Bot"
          git config user.email "bot@lflaitool.top"
          git add content/news/ data/content-index.json
          if git diff --cached --quiet; then
            echo "No new news briefs generated"
          else
            git commit -m "auto: daily AI news brief ($(date +%Y-%m-%d))"
            git push
          fi
