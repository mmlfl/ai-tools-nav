name: Monthly RAG Ingestion

on:
  schedule:
    - cron: "23 6 1 * *"    # 1st of each month ~6:23 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: rag-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r python-service/requirements.txt
      - run: python python-service/ingest.py
        env:
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          QWEN_BASE_URL: ${{ secrets.QWEN_BASE_URL }}
          MODEL_NAME: ${{ secrets.MODEL_NAME }}
          MILVUS_URI: ${{ secrets.MILVUS_URI }}
          MILVUS_TOKEN: ${{ secrets.MILVUS_TOKEN }}
