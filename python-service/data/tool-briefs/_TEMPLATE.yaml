# ============================================================
# 工具资料模板
# 用法: 复制此文件,改名为 <slug>.yaml, 填好对应字段
# 脚本生成文章时会自动读取注入到 prompt 中
# ============================================================

# ---- 价格 ---- （注明信息截止日期）
pricing:
  free_tier: ""             # 免费额度，如 "GPT-4o-mini 无限次"
  paid_plans:
    - name: ""              # "Plus" / "Pro" / "Team"
      price: ""             # "￥20/月" or "$20/month"
      includes: ""

# ---- 核心功能亮点 ---- （3-6条，越具体越好）
features: []

# ---- 最近更新 ---- （2025-2026 年内）
recent_updates:
  - date: ""                # "2026-03"
    summary: ""

# ---- 优劣势 ---- （只写可验证的事实）
pros: []
cons: []

# ---- 竞品差异 ----
vs_competitors:
  - competitor: ""          # 对手 slug, 如 "chatgpt"
    advantage: ""           # 你这个工具相对它的独特优势
    weakness: ""            # 你这个工具相对它的劣势

# ---- 评测/排行 ----
benchmarks:
  lmsys_elo: 0
  source: ""                # 数据出处 + 日期

# ---- 适用画像 ----
target_users: []

# ---- 资料出处 ----
sources: []
